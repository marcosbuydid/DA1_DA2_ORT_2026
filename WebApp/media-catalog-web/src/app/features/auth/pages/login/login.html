<div class="container">
  <div class="row justify-content-center align-items-center vh-100 py-5" 
       style="background: #f8f9fa;"> 
    <div class="col-sm-10 col-md-8 col-lg-6 col-xl-5">
      <div class="card shadow-sm rounded-4 border-0" 
           style="background: #ffffff;">
        <div class="card-body p-5 text-center">
          <h1 class="mb-4 fw-bold text-dark">Login</h1>
          <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-3">
            <!-- Email -->
            <div class="mb-3">
              <input type="email" 
                     class="form-control form-control-lg rounded-3" 
                     placeholder="Type your email" 
                     formControlName="email"
                     [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" />
              <div *ngIf="submitted && f['email'].errors" class="invalid-feedback text-start">
                <div *ngIf="f['email'].errors['required']">Email is required</div>
                <div *ngIf="f['email'].errors['email']">Email is invalid</div>
              </div>
            </div>
            <!-- Password -->
            <div class="mb-4 position-relative">
              <input type="password" 
                     class="form-control form-control-lg rounded-3" 
                     placeholder="Type your password" 
                     formControlName="password"
                     [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" />
              <div *ngIf="submitted && f['password'].errors" class="invalid-feedback text-start">
                <div *ngIf="f['password'].errors['required']">Password is required</div>
              </div>
            </div>
            <!-- Submit Button -->
            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-primary btn-lg rounded-3 shadow-sm">
                Sign In
              </button>
            </div>
            <div class="text-center">
              <small class="text-muted">Copyright ©2026 <a target="_blank" class="text-decoration-none text-dark">MediaCatalog</a>. All rights reserved.</small>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
